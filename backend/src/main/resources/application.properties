spring.application.name=queue-solved
server.port=${PORT:8080}

# MongoDB Atlas Configuration - Uses environment variable
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=smartclinic_queue

# WebSocket Configuration
spring.websocket.buffer-size=8192

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false

# Logging
logging.level.com.smartclinic=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG