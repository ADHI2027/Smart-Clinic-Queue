spring.application.name=queue-cure
server.port=${PORT:8080}

# MongoDB Atlas Configuration - Uses environment variable
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=smartclinic_queue

# WebSocket Configuration
spring.websocket.buffer-size=8192

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false

# Logging
logging.level.com.smartclinic=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:+14155238886}
twilio.whatsapp.template.sid=${TWILIO_TEMPLATE_SID:HXb5b62575e6e4ff6129ad7c8efe1f983e}